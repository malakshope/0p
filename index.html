::-webkit-scrollbar-thumb{background:var(--pink);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

/* ─── HEADER ─── */
#app-header {
  background:var(--glass);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--glass-border);
  height:64px;display:flex;align-items:center;
  justify-content:space-between;padding:0 24px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(220,140,160,0.12);
}
.hdr-brand{display:flex;align-items:center;}
.hdr-logo-img{
  height:46px;width:auto;
  object-fit:contain;
  display:block;
  /* blend the logo's cream bg into the glass header */
  mix-blend-mode:multiply;
  filter:drop-shadow(0 1px 4px rgba(180,100,120,0.15));
}
/* keep old ids in case JS references them — hide them */
.hdr-name,.hdr-sub{display:none;}
.hdr-btn{
  background:var(--pink);border:1.5px solid var(--pink-deep);
  color:var(--rose-text);padding:8px 20px;
  border-radius:var(--radius-pill);
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;
  box-shadow:0 2px 12px rgba(220,140,160,0.25);
}
.hdr-btn:hover{background:var(--pink-deep);border-color:#d48898;transform:translateY(-1px);box-shadow:0 4px 16px rgba(220,140,160,0.35);}

/* ─── HOME PAGE ─── */
#page-home{display:flex;flex-direction:column;flex:1;min-height:0;}
#page-home.hidden{display:none;}
.home-wrap{flex:1;max-width:760px;width:100%;margin:0 auto;padding:28px 16px 50px;overflow-y:auto;}

/* hero */
.home-hero{text-align:center;margin-bottom:22px;animation:fadeUp .5s ease;}
.home-hero-logo{max-width:120px;width:100%;height:auto;margin:0 auto 14px;display:block;mix-blend-mode:multiply;filter:drop-shadow(0 2px 8px rgba(180,100,120,0.18));}
.home-hero-title{font-size:19px;font-weight:800;color:var(--rose-text);margin-bottom:8px;line-height:1.6;}
.home-hero-sub{font-size:13.5px;color:var(--rose-muted);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;}

/* badges */
.home-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:28px;animation:fadeUp .5s ease .05s both;}
.home-badge{
  background:var(--glass-card);border:1px solid var(--glass-border);
  color:var(--rose-muted);font-size:12px;font-weight:700;
  padding:8px 16px;border-radius:var(--radius-pill);
  box-shadow:var(--shadow-card);white-space:nowrap;
}

/* cards grid */
.home-cards{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:6px;}
@media(min-width:680px){.home-cards{grid-template-columns:repeat(3,1fr);}}

.home-card{
  background:var(--glass-card);border:1.5px solid var(--glass-border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-card);
  padding:22px 18px;text-align:center;cursor:pointer;
  transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;
  position:relative;
}
.home-card:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(180,100,120,0.16);}
.home-card.active{border-color:var(--pink-deep);box-shadow:0 8px 26px rgba(220,140,160,0.28);background:var(--pink-pale);}
.home-card-icon{font-size:28px;margin-bottom:8px;}
.home-card-title{font-size:15.5px;font-weight:800;color:var(--rose-text);margin-bottom:6px;}
.home-card-desc{font-size:12px;color:var(--rose-muted);line-height:1.7;margin-bottom:8px;}
.home-card-arrow{font-size:13px;color:var(--rose-dim);transition:transform .3s ease;}
.home-card.active .home-card-arrow{transform:rotate(180deg);color:var(--pink-deep);}

/* expandable panels */
.home-panel{
  max-height:0;opacity:0;overflow:hidden;
  transition:max-height .45s ease,opacity .35s ease,margin .45s ease;
}
.home-panel.open{max-height:4000px;opacity:1;margin-top:16px;}
.home-panel-inner{
  background:var(--glass-card);border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-card);
  padding:18px 16px;
}

/* products panel */
.home-prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:12px;}
.home-prod-card{
  background:var(--ivory);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:10px;text-align:center;
  box-shadow:0 2px 10px rgba(180,100,120,0.06);
}
.home-prod-img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:10px;margin-bottom:8px;}
.home-prod-noimg{width:100%;aspect-ratio:1/1;border-radius:10px;margin-bottom:8px;background:var(--pink-pale);display:flex;align-items:center;justify-content:center;font-size:24px;}
.home-prod-name{font-size:12.5px;font-weight:700;color:var(--rose-text);margin-bottom:4px;line-height:1.4;}
.home-prod-price{font-size:12px;font-weight:800;color:var(--sage-deep);margin-bottom:8px;}
.home-select-btn{
  width:100%;background:var(--pink);border:1px solid var(--pink-deep);
  color:var(--rose-text);padding:7px 0;border-radius:var(--radius-pill);
  font-family:'Tajawal',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;transition:.2s;
}
.home-select-btn:hover{background:var(--pink-deep);}

/* order form */
.home-form{display:flex;flex-direction:column;gap:11px;}
.home-inp{
  width:100%;border:1.5px solid var(--glass-border);border-radius:var(--radius);
  background:var(--ivory);color:var(--rose-text);
  padding:11px 13px;font-family:'Tajawal',sans-serif;font-size:13.5px;
  outline:none;transition:border-color .2s;
}
.home-inp:focus{border-color:var(--pink-deep);}
.home-textarea{resize:vertical;min-height:70px;}
.home-submit-btn{
  background:var(--pink);border:1.5px solid var(--pink-deep);
  color:var(--rose-text);padding:13px;border-radius:var(--radius-pill);
  font-family:'Tajawal',sans-serif;font-size:14.5px;font-weight:800;
  cursor:pointer;transition:.2s;box-shadow:0 2px 12px rgba(220,140,160,0.25);
}
.home-submit-btn:hover{background:var(--pink-deep);transform:translateY(-1px);box-shadow:0 4px 16px rgba(220,140,160,0.35);}

/* order success */
.home-success{text-align:center;padding:8px 0;animation:fadeUp .35s ease;}
.home-success-icon{font-size:34px;margin-bottom:10px;}
.home-success-msg{font-size:15px;font-weight:800;color:var(--sage-deep);margin-bottom:18px;}
.home-success-actions{display:flex;flex-direction:column;gap:9px;}
.home-action-btn{
  border:1.5px solid var(--glass-border);background:var(--ivory);
  color:var(--rose-text);padding:11px;border-radius:var(--radius-pill);
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;
}
.home-action-btn:hover{background:var(--pink-soft);border-color:var(--pink-deep);}
.home-action-btn.danger{color:#ffffff;background:#d61f1f;border-color:#d61f1f;}
.home-action-btn.danger:hover{background:#b71414;border-color:#b71414;}
.home-action-btn.success{color:var(--sage-deep);border-color:var(--sage);background:var(--sage-pale);}
.home-action-btn.success:hover{background:#dde6cb;}

/* delivery panel */
.home-deliv-search{
  width:100%;border:1.5px solid var(--glass-border);border-radius:var(--radius-pill);
  background:var(--ivory);color:var(--rose-text);padding:10px 16px;
  font-family:'Tajawal',sans-serif;font-size:13px;outline:none;margin-bottom:14px;
}
.home-deliv-search:focus{border-color:var(--pink-deep);}
.home-deliv-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 4px;border-bottom:1px solid rgba(247,198,208,0.3);
}
.home-deliv-row:last-child{border-bottom:none;}
.home-deliv-name{font-size:13px;font-weight:700;color:var(--rose-text);}
.home-deliv-meta{display:flex;flex-wrap:wrap;gap:8px 12px;font-size:11.5px;color:var(--rose-muted);justify-content:flex-end;}
.home-deliv-meta span:first-child{color:var(--sage-deep);font-weight:700;}
.home-deliv-domicile{color:var(--pink-deep);font-weight:700;}
.home-empty{text-align:center;color:var(--rose-dim);font-size:13px;padding:20px;}

/* ─── CHAT PAGE ─── */
#page-chat{display:flex;flex-direction:column;flex:1;min-height:0;}
#page-chat.hidden{display:none;}

.chat-body{
  flex:1;max-width:720px;width:100%;
  margin:0 auto;padding:20px 16px 0;
  display:flex;flex-direction:column;min-height:0;
}
.msgs{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  padding-bottom:14px;scroll-behavior:smooth;
}

.msg-row{display:flex;gap:10px;animation:fadeUp .3s ease;}
.msg-row.bot{align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;align-items:flex-end;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.av{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;letter-spacing:.3px;
}
.av.bot{
  background:transparent;
  border:1.5px solid var(--glass-border);

  background-size:cover;
  background-position:center;
  color:transparent;
}
.av.user{
  background:var(--sage-pale);
  border:1.5px solid var(--sage);
  color:var(--sage-deep);
}

.bub{
  max-width:78%;padding:12px 16px;
  font-size:14px;line-height:1.8;word-break:break-word;
}
.bub.bot{
  background:var(--glass-card);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  color:var(--rose-text);
  border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;
  box-shadow:var(--shadow-card);
}
.bub.user{
  background:linear-gradient(135deg,var(--pink-soft),var(--pink));
  border:1px solid var(--pink-deep);
  color:var(--rose-text);
  border-radius:var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
  box-shadow:var(--shadow-card);
}

/* typing */
.typing-row{display:flex;gap:10px;align-items:flex-end;}
.typing-bub{
  background:var(--glass-card);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  padding:14px 18px;
  border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;
  display:flex;gap:5px;align-items:center;
  box-shadow:var(--shadow-card);
}
.dot{width:5px;height:5px;background:var(--pink-deep);border-radius:50%;animation:dotBounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.18s;}
.dot:nth-child(3){animation-delay:.36s;}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* ─── PRODUCT CARDS ─── */
.cat-hdr{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;font-weight:500;font-style:italic;
  color:var(--sage-deep);letter-spacing:1.2px;
  padding:10px 0 7px;
  border-bottom:1px solid var(--glass-border);
  margin-bottom:10px;margin-top:14px;display:flex;align-items:center;gap:8px;
}
.cat-hdr::before{content:'✿';font-size:11px;color:var(--pink-deep);}
.cat-hdr:first-child{margin-top:0;}

.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:10px;margin-bottom:6px;}
.pcard{
  background:var(--glass-card);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);padding:12px 10px;
  text-align:center;transition:.2s;cursor:pointer;
  box-shadow:var(--shadow-card);
}
.pcard:hover{border-color:var(--pink-deep);transform:translateY(-2px);box-shadow:0 8px 28px rgba(220,140,160,0.18);}
.pcard-img{width:100%;height:84px;object-fit:cover;border-radius:10px;margin-bottom:8px;display:block;}
.pcard-noimg{width:100%;height:84px;background:var(--pink-pale);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.pcard-noimg::after{content:'✿';}
.pcard-name{font-size:12px;font-weight:700;color:var(--rose-text);margin-bottom:3px;}
.pcard-desc{font-size:10px;color:var(--rose-muted);margin-bottom:7px;line-height:1.5;}
.pcard-price{
  display:inline-block;
  background:linear-gradient(135deg,var(--pink-soft),var(--pink));
  border:1px solid var(--pink-deep);
  color:var(--rose-text);font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:var(--radius-pill);
}

/* delivery table */
.dtable{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px;}
.dtable th{background:var(--pink-pale);color:var(--rose-muted);padding:8px 11px;text-align:right;font-weight:700;border-bottom:1px solid var(--glass-border);}
.dtable td{padding:7px 11px;border-bottom:1px solid rgba(247,198,208,0.3);color:var(--rose-text);}
.dtable tr:last-child td{border-bottom:none;}
.dtable tr:nth-child(even) td{background:rgba(255,240,245,0.4);}

/* quick buttons */
.qbtns{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
.qbtn{
  padding:8px 18px;border-radius:var(--radius-pill);
  border:1.5px solid var(--pink-deep);
  background:rgba(255,255,255,0.7);
  color:var(--rose-text);
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;white-space:nowrap;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.qbtn:hover{background:var(--pink);border-color:var(--pink-deep);transform:translateY(-1px);box-shadow:0 4px 14px rgba(220,140,160,0.25);}
.qbtn.danger{border-color:#d4778a;color:#a04055;background:rgba(255,230,235,0.7);}
.qbtn.danger:hover{background:#f9c0cc;border-color:#c05a70;}
.qbtn.success{border-color:var(--sage);color:var(--sage-deep);background:rgba(232,237,217,0.8);}
.qbtn.success:hover{background:var(--sage-pale);border-color:var(--sage-deep);}

/* instagram */
.ig-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#f8d4dc,#f4a0b8);
  border:1.5px solid #d4778a;
  color:#a04055;padding:10px 20px;border-radius:var(--radius-pill);
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;text-decoration:none;transition:.2s;margin-top:10px;
  box-shadow:0 2px 12px rgba(220,140,160,0.2);
}
.ig-btn:hover{background:linear-gradient(135deg,#f4a0b8,#ed8fb0);transform:translateY(-1px);}
.ig-icon{width:16px;height:16px;fill:#a04055;flex-shrink:0;}
.copy-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,250,245,0.8);border:1.5px solid var(--glass-border);
  color:var(--rose-muted);padding:9px 18px;border-radius:var(--radius-pill);
  font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;margin-top:10px;
}
.copy-btn:hover{border-color:var(--pink-deep);color:var(--rose-text);}

/* order summary */
.o-summary{
  background:var(--glass-card);border:1.5px solid var(--glass-border);
  border-radius:var(--radius-lg);padding:16px;margin-top:10px;
  box-shadow:var(--shadow-soft);
}
.o-sum-title{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:500;font-style:italic;
  color:var(--rose-text);
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
}
.o-sum-badge{font-size:11px;font-weight:700;padding:2px 12px;border-radius:var(--radius-pill);font-family:'Tajawal',sans-serif;font-style:normal;}
.o-sum-badge.new{background:var(--pink-soft);color:var(--rose-muted);border:1px solid var(--pink);}
.o-sum-badge.saved{background:var(--sage-pale);color:var(--sage-deep);border:1px solid var(--sage);}
.o-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(247,198,208,0.3);}
.o-row:last-child{border-bottom:none;}
.o-lbl{color:var(--rose-muted);}
.o-val{font-weight:700;color:var(--rose-text);}

/* step bar */
.step-bar{display:flex;gap:0;margin-bottom:12px;margin-top:4px;background:var(--glass-card);border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden;}
.step-item{flex:1;padding:7px 4px;font-size:10px;font-weight:700;text-align:center;color:var(--rose-dim);border-left:1px solid var(--glass-border);transition:.2s;}
.step-item:last-child{border-left:none;}
.step-item.done{color:var(--sage-deep);background:rgba(232,237,217,0.6);}
.step-item.active{color:var(--rose-text);background:var(--pink-soft);}

/* ─── INPUT BAR ─── */
.input-wrap{
  background:var(--glass);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--glass-border);
  position:sticky;bottom:0;
  box-shadow:0 -2px 20px rgba(220,140,160,0.10);
}
.input-inner{max-width:720px;margin:0 auto;padding:11px 16px;display:flex;gap:9px;align-items:center;}
.chat-inp{
  flex:1;background:rgba(255,255,255,0.85);
  border:1.5px solid var(--pink);
  border-radius:var(--radius-pill);padding:9px 18px;
  font-family:'Tajawal',sans-serif;font-size:14px;color:var(--rose-text);
  outline:none;min-height:40px;max-height:100px;overflow-y:auto;transition:.2s;
}
.chat-inp:focus{border-color:var(--pink-deep);box-shadow:0 0 0 3px rgba(247,198,208,0.3);}
.chat-inp:empty::before{content:attr(data-ph);color:var(--rose-dim);pointer-events:none;}
.send-btn{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  border:none;border-radius:50%;
  color:white;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.2s;
  box-shadow:0 2px 12px rgba(220,140,160,0.35);
}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(220,140,160,0.45);}

/* ─── CODE OVERLAY ─── */
.overlay{position:fixed;inset:0;background:rgba(120,60,75,0.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;}
.overlay.hidden{display:none;}
.popup{
  background:var(--ivory);border:1.5px solid var(--glass-border);
  border-radius:var(--radius-lg);padding:32px 28px;
  width:90%;max-width:330px;animation:popIn .25s ease;
  box-shadow:0 20px 60px rgba(180,100,120,0.25);
  text-align:center;
}
@keyframes popIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.popup-deco{font-size:28px;margin-bottom:12px;}
.popup-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;font-style:italic;color:var(--rose-text);margin-bottom:5px;}
.popup-sub{font-size:12px;color:var(--rose-muted);margin-bottom:20px;}
.popup-inp{
  width:100%;background:var(--pink-pale);border:1.5px solid var(--pink);
  border-radius:var(--radius);padding:11px 16px;font-family:'Tajawal',sans-serif;
  font-size:20px;text-align:center;letter-spacing:6px;font-weight:700;
  color:var(--rose-text);outline:none;margin-bottom:6px;transition:.2s;
}
.popup-inp:focus{border-color:var(--pink-deep);box-shadow:0 0 0 3px rgba(247,198,208,0.3);}
.popup-inp.err{border-color:#c06070;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.popup-err{font-size:12px;color:#b04060;font-weight:600;min-height:16px;margin-bottom:14px;text-align:center;}
.popup-actions{display:flex;gap:9px;}
.pbtn-ok{flex:1;background:linear-gradient(135deg,var(--pink),var(--pink-deep));border:none;border-radius:var(--radius-pill);padding:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;color:white;cursor:pointer;transition:.2s;box-shadow:0 2px 12px rgba(220,140,160,0.3);}
.pbtn-ok:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(220,140,160,0.4);}
.pbtn-cancel{flex:1;background:transparent;border:1.5px solid var(--glass-border);border-radius:var(--radius-pill);padding:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;color:var(--rose-muted);cursor:pointer;transition:.2s;}
.pbtn-cancel:hover{border-color:var(--pink);color:var(--rose-text);}

/* ─── DASHBOARD ─── */
#page-dash{display:none;flex-direction:column;min-height:100vh;}
#page-dash.active{display:flex;}

.dash-header{
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--glass-border);
  padding:0 24px;height:60px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:150;
}
.dash-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;font-style:italic;color:var(--rose-text);}
.back-btn{background:rgba(255,255,255,0.8);border:1.5px solid var(--glass-border);color:var(--rose-muted);padding:7px 18px;border-radius:var(--radius-pill);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;}
.back-btn:hover{border-color:var(--pink-deep);color:var(--rose-text);}

.tabs{background:var(--glass);backdrop-filter:blur(8px);border-bottom:1px solid var(--glass-border);display:flex;padding:0 24px;overflow-x:auto;}
.tabs::-webkit-scrollbar{height:0;}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--rose-muted);padding:14px 16px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;}
.tab:hover{color:var(--rose-text);}
.tab.on{color:var(--rose-text);border-bottom-color:var(--pink-deep);}

.tab-pane{display:none;padding:22px 24px;flex:1;overflow-y:auto;}
.tab-pane.on{display:block;}

.toolbar{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px;align-items:center;}
.t-inp{
  background:rgba(255,255,255,0.85);border:1.5px solid var(--glass-border);
  border-radius:var(--radius-pill);padding:9px 16px;
  font-family:'Tajawal',sans-serif;font-size:13px;color:var(--rose-text);
  outline:none;transition:.2s;min-width:160px;
}
.t-inp:focus{border-color:var(--pink-deep);box-shadow:0 0 0 3px rgba(247,198,208,0.2);}
.t-inp::placeholder{color:var(--rose-dim);}
.t-inp[type=date]{cursor:pointer;color-scheme:light;}
.t-btn{background:rgba(255,255,255,0.8);border:1.5px solid var(--glass-border);color:var(--rose-muted);padding:9px 16px;border-radius:var(--radius-pill);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;white-space:nowrap;transition:.2s;}
.t-btn:hover{border-color:var(--pink);color:var(--rose-text);}

.date-nav{display:flex;align-items:center;gap:9px;margin-bottom:16px;}
.date-nav-label{font-size:14px;font-weight:700;color:var(--rose-text);flex:1;}
.date-arrow{background:rgba(255,255,255,0.8);border:1.5px solid var(--glass-border);color:var(--rose-muted);width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.2s;}
.date-arrow:hover{background:var(--pink-soft);border-color:var(--pink);color:var(--rose-text);}

/* TABLE */
.tbl-wrap{
  background:var(--glass-card);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1.5px solid var(--glass-border);border-radius:var(--radius-lg);
  overflow:hidden;overflow-x:auto;box-shadow:var(--shadow-soft);
}
.tbl{width:100%;border-collapse:collapse;min-width:720px;}
.tbl th{background:var(--pink-pale);color:var(--rose-muted);padding:12px 13px;text-align:right;font-size:12px;font-weight:700;border-bottom:1.5px solid var(--glass-border);}
.tbl td{padding:12px 13px;font-size:13px;color:var(--rose-text);border-bottom:1px solid rgba(247,198,208,0.25);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,240,245,0.5);}

.tbl tr.row-confirmed td{background:rgba(27,94,32,0.10);color:#1b5e20;font-weight:800;}
.tbl tr.row-cancelled td{background:rgba(214,31,31,0.10) !important;color:#d61f1f !important;font-weight:800;}
.tbl tr.row-new td{background:transparent;}

.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:var(--radius-pill);font-size:11px;font-weight:700;}
.status-badge.new{background:var(--pink-soft);color:var(--rose-muted);border:1px solid var(--pink);}
.status-badge.confirmed{background:#e1f0e2;color:#1b5e20;border:1.5px solid #2e7d32;font-weight:800;}
.status-badge.cancelled{background:#fbe3e3;color:#d61f1f;border:1.5px solid #d61f1f;font-weight:800;}

.act-btn{background:rgba(255,255,255,0.8);border:1.5px solid var(--glass-border);color:var(--rose-muted);padding:5px 12px;border-radius:var(--radius-pill);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;white-space:nowrap;transition:.2s;}
.act-btn:hover{border-color:var(--pink);color:var(--rose-text);}
.act-btn.g:hover{border-color:#2e7d32;color:#1b5e20;}
.act-btn.r:hover{border-color:#d61f1f;color:#d61f1f;}
.act-btn.active-g{border-color:#2e7d32;color:#1b5e20;background:#e1f0e2;font-weight:800;}

.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.stat-chip{background:rgba(255,255,255,0.75);border:1px solid var(--glass-border);border-radius:var(--radius-pill);padding:8px 18px;font-size:13px;color:var(--rose-muted);backdrop-filter:blur(8px);}
.stat-chip b{color:var(--rose-text);font-weight:800;}
.stat-chip.red b{color:#d61f1f;}
.stat-chip.green b{color:#1b5e20;}

.empty{text-align:center;padding:55px 20px;color:var(--rose-dim);}
.empty p{font-size:15px;font-weight:600;font-style:italic;}
.empty::before{content:'✿';display:block;font-size:32px;margin-bottom:12px;opacity:.5;}

/* PRODUCTS MANAGEMENT */
.pm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.pm-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;font-style:italic;color:var(--rose-text);}
.add-btn{background:linear-gradient(135deg,var(--pink-soft),var(--pink));border:1.5px solid var(--pink-deep);color:var(--rose-text);padding:9px 20px;border-radius:var(--radius-pill);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;transition:.2s;}
.add-btn:hover{background:var(--pink);transform:translateY(-1px);}

.pm-list{display:flex;flex-direction:column;gap:10px;}
.pm-card{
  background:var(--glass-card);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);border-radius:var(--radius-lg);
  padding:14px;display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow-card);transition:.2s;
}
.pm-card:hover{box-shadow:var(--shadow-soft);}
.pm-img{width:68px;height:68px;object-fit:cover;border-radius:10px;flex-shrink:0;}
.pm-noimg{width:68px;height:68px;border-radius:10px;background:var(--pink-pale);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.pm-noimg::after{content:'✿';opacity:.5;}
.pm-info{flex:1;min-width:0;}
.pm-badge{display:inline-block;background:var(--pink-soft);border:1px solid var(--pink);color:var(--rose-muted);font-size:9px;font-weight:700;padding:2px 9px;border-radius:var(--radius-pill);margin-bottom:4px;}
.pm-name{font-size:14px;font-weight:700;margin-bottom:2px;color:var(--rose-text);}
.pm-desc{font-size:11px;color:var(--rose-muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm-price{font-size:12px;font-weight:700;color:var(--rose-text);}
.pm-acts{display:flex;gap:7px;flex-shrink:0;}
.pm-btn{background:rgba(255,255,255,0.8);border:1.5px solid var(--glass-border);color:var(--rose-muted);padding:5px 14px;border-radius:var(--radius-pill);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;transition:.2s;}
.pm-btn.edit:hover{border-color:var(--pink);color:var(--rose-text);}
.pm-btn.del:hover{border-color:#d4778a;color:#a04055;}

/* SETTINGS */
.settings-block{background:var(--glass-card);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;box-shadow:var(--shadow-card);}
